# ===========================================================================
# Periscope reverse-proxy snippet for the HOST nginx on kind.io.tudelft.nl
# ===========================================================================
#
# Add the two location blocks below INSIDE the existing server { } block that
# already terminates TLS for kind.io.tudelft.nl (the one with
# `listen 443 ssl;` and `server_name kind.io.tudelft.nl;`).
#
# The Periscope docker stack publishes its web container on 127.0.0.1:8080
# (see docker-compose.yml). This snippet forwards the /periscope path to it.
#
# Apply with:
#     sudo nginx -t && sudo systemctl reload nginx
# ---------------------------------------------------------------------------

    # Bare path -> trailing-slash form, so visiting /periscope loads the app.
    location = /periscope {
        return 301 /periscope/;
    }

    location /periscope/ {
        # IMPORTANT: no URI part on proxy_pass, so the /periscope/ prefix is
        # preserved and forwarded unchanged. The container serves the app under
        # /periscope/ and mounts the API at /periscope/api, so the prefix must
        # NOT be stripped or rewritten here.
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # Vision/answer payloads are small JSON; a little headroom is plenty.
        client_max_body_size 16m;
    }
