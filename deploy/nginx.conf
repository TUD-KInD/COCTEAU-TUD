# nginx config for the "web" container. This is the internal reverse proxy
# that sits behind the host's own nginx. It serves the static front-end under
# /periscope/ and forwards API calls to the uWSGI/Flask "api" container.
server {
    listen 80;
    server_name _;

    # Redirect the bare path to the trailing-slash form.
    location = /periscope {
        return 301 /periscope/;
    }

    # API: proxy to the api container. We resolve the "api" hostname at request
    # time via Docker's embedded DNS (127.0.0.11) and pass it through a variable,
    # so nginx starts even if the api container is momentarily unresolvable and
    # picks up its new IP across restarts. $request_uri preserves the full
    # original path and query (/periscope/api/...), matching the uWSGI mount.
    # This location is a longer prefix than /periscope/ below, so API requests
    # route here.
    location /periscope/api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_api api;
        proxy_pass http://$upstream_api:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static front-end. alias maps /periscope/<path> to /usr/share/nginx/html/<path>.
    location /periscope/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
