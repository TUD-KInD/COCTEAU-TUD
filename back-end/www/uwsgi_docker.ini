[uwsgi]
; uWSGI configuration for the Docker deployment.
; Listen on all interfaces so the nginx container can reach it.
http-socket = 0.0.0.0:8080

; Mount the Flask app under the /periscope/api path prefix. Combined with
; manage-script-name, uWSGI sets SCRIPT_NAME=/periscope/api so Flask routes
; and generated URLs stay correct behind the reverse proxy (which preserves
; the /periscope/api prefix rather than stripping it).
mount = /periscope/api=application.py
callable = app
manage-script-name = true

master = true
processes = 3

; Do not daemonize or log to a file; let Docker capture stdout/stderr.
die-on-term = true
