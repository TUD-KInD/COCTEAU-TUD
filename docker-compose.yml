# Deployment stack for https://kind.io.tudelft.nl/periscope
#
# Three services:
#   db  - PostgreSQL 13 (matches the production dump), data in a named volume
#   api - Flask app served by uWSGI, mounted at /periscope/api
#   web - nginx serving the front-end and reverse-proxying the API
#
# Only the web container publishes a port, bound to loopback; the host's own
# nginx proxies https://kind.io.tudelft.nl/periscope/ to it.
#
# Copy .env.example to .env and set POSTGRES_PASSWORD before running.

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: public_engagement_tool
      POSTGRES_DB: public_engagement_tool
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - db-data:/var/lib/postgresql/data
      # SQL/scripts placed here run once, on first initialization of an empty
      # data volume. The production dump is restored here in Phase 4.
      - ./deploy/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U public_engagement_tool -d public_engagement_tool"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    environment:
      APP_CONFIG: production
    volumes:
      # Secret files are provided at runtime, never baked into the image.
      - ./back-end/secret:/app/secret:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    ports:
      # Bind to loopback only; the host nginx reverse-proxies to this.
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
